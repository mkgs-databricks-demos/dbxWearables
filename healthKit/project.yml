name: dbxWearablesApp

options:
  bundleIdPrefix: com.dbxwearables
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: NO

targets:
  dbxWearablesApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: healthKit
        excludes:
          - "**/README.md"
          - "App/Info.plist"
          - "Entitlements/dbxWearablesApp.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dbxwearables.dbxWearablesApp
        PRODUCT_MODULE_NAME: dbxWearablesApp
        PRODUCT_NAME: dbxWearablesApp
        INFOPLIST_FILE: healthKit/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: healthKit/Entitlements/dbxWearablesApp.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    dependencies:
      - sdk: HealthKit.framework
    scheme:
      environmentVariables:
        - variable: DBX_API_BASE_URL
          value: "https://dev-dbxw-0bus-ingest-7474657291520070.aws.databricksapps.com"
          isEnabled: true
        - variable: DBX_WORKSPACE_HOST
          value: "https://fevm-hls-fde.cloud.databricks.com"
          isEnabled: true
      testTargets:
        - healthKitTests
        - healthKitUITests
      gatherCoverageData: true

  healthKitTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: healthKitTests
        excludes:
          - "**/README.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dbxwearables.healthKitTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: dbxWearablesApp

  healthKitUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: healthKitUITests
        excludes:
          - "**/README.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dbxwearables.healthKitUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: dbxWearablesApp
    dependencies:
      - target: dbxWearablesApp
