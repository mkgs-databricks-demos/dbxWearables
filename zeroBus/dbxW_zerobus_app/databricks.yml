# Databricks Asset Bundle — dbxW_zerobus_app
# Application bundle for the dbxWearables ZeroBus solution.
# Deploy this bundle AFTER the dbxW_zerobus_infra infrastructure bundle.
#
# Manages: AppKit REST API, ZeroBus SDK consumer, Spark Declarative
#          Pipelines (silver/gold), jobs, and dashboards.
#
# See https://docs.databricks.com/en/dev-tools/bundles/settings.html

bundle:
  name: "dbxW_zerobus_app"

include:
  - resources/*.yml
  - resources/*/*.yml

# ---------------------------------------------------------------------------
# Variable declarations
# Assigned per-target below; referenced in resource YAML files.
# ---------------------------------------------------------------------------
#
# CONVENTION — catalog & schema references:
#   Cross-bundle resource substitutions are NOT supported in DAB, so the
#   app bundle maintains its own `catalog` and `schema` variables whose
#   per-target values MUST match those deployed by the companion
#   dbxW_zerobus_infra bundle.
#
#   Infra bundle deploys (referenced by substitution within that bundle):
#     - UC schema:      resources.schemas.wearables_schema
#     - Secret scope:   resources.secret_scopes.zerobus_secret_scope
#     - SQL warehouse:  resources.sql_warehouses.infra_warehouse
#
#   This app bundle references those objects by name/value:
#     ${var.catalog}.${var.schema}      — fully qualified schema
#     ${var.secret_scope_name}          — secret scope name
#
#   If the infra target values change, update BOTH bundles.
# ---------------------------------------------------------------------------
variables:
  catalog:
    description: >
      The Unity Catalog catalog for wearable data objects.
      Must match the catalog deployed by dbxW_zerobus_infra for this target.
  schema:
    description: >
      The Unity Catalog schema name within the catalog.
      Must match the schema deployed by dbxW_zerobus_infra for this target.
  secret_scope_name:
    description: The Databricks secret scope name for ZeroBus credentials.
    default: dbxw_zerobus_credentials
  client_id_dbs_key:
    description: The key name for the ZeroBus OAuth2 M2M client ID in the secret scope.
    default: client_id
  client_secret_dbs_key:
    description: The key name for the ZeroBus OAuth2 M2M client ID in the secret scope.
    default: client_secret
  run_as_user:
    description: The user or service principal that workflows should run as.
  higher_level_service_principal:
    description: >
      The service principal application ID for higher-level (non-dev) deployments.
      Comment out or override if not using a service principal for deployments above dev.
    default: acf021b4-87c6-44ff-b3d7-45c59d63fe4d
  serverless_environment_version:
    description: The serverless environment version for notebook/job tasks.
    default: "5"
  dashboard_embed_credentials:
    description: >
      true = dashboard uses owner's credentials; false = viewer's credentials.
    default: false

  # Lakebase Postgres — resource identifiers for the AppKit lakebase plugin.
  # Obtain by running:
  #   databricks postgres list-branches projects/{project-id}
  #   databricks postgres list-databases {branch-name}
  postgres_branch:
    description: >
      Full Lakebase Postgres branch resource name.
      Format: projects/{project-id}/branches/{branch-id}
  postgres_database:
    description: >
      Full Lakebase Postgres database resource name.
      Format: projects/{project-id}/branches/{branch-id}/databases/{database-id}

  # App Telemetry (Beta) — OpenTelemetry export to Unity Catalog.
  # Tables created: {prefix}_otel_logs, {prefix}_otel_spans, {prefix}_otel_metrics
  # Persists traces, logs, and metrics via the OTel protocol.
  # See https://docs.databricks.com/aws/en/dev-tools/databricks-apps/observability/
  telemetry_table_prefix:
    description: >
      Prefix for the OTel telemetry tables written to Unity Catalog.
      Tables: {prefix}_otel_logs, {prefix}_otel_spans, {prefix}_otel_metrics.
      Use a prefix to avoid collisions if multiple apps share the same schema.
    default: dbxw_0bus_ingest

  # ZeroBus SDK stream pool — controls the number of concurrent gRPC streams
  # opened to the ZeroBus Ingest server. More streams = higher throughput.
  # Each stream is an independent connection with per-stream ordering
  # guarantees. Cross-stream ordering is NOT guaranteed (acceptable: each
  # iOS POST is an independent batch).
  #
  # Value is stored in the secret scope (key: zerobus_stream_pool_size) and
  # injected as ZEROBUS_STREAM_POOL_SIZE env var via the app resource.
  # Populate via: databricks secrets put-secret \
  #   dbxw_zerobus_credentials zerobus_stream_pool_size \
  #   --string-value "<value>"
  zerobus_stream_pool_size:
    description: >
      Number of concurrent gRPC streams in the ZeroBus SDK stream pool.
      More streams = higher throughput at the cost of more connections.
      The service falls back to 4 if the env var is unset.
    default: "4"

  # ── JWT Authentication (Phase 1) ────────────────────────────────────
  #
  # App-managed JWT auth for mobile clients via Sign in with Apple.
  # See server/services/auth-service.ts for the implementation.
  #
  # Graceful degradation: if the signing secret is not provisioned, the
  # auth service stays uninitialized and auth endpoints return 503.
  # The rest of the app (ZeroBus ingest, Lakebase, admin UI) works normally.
  #
  # Provision secrets:
  #   databricks secrets put-secret dbxw_zerobus_credentials jwt_signing_secret \
  #     --string-value "$(openssl rand -base64 32)"
  #   databricks secrets put-secret dbxw_zerobus_credentials apple_bundle_id \
  #     --string-value "com.dbxwearables.healthKit"
  #   databricks secrets put-secret dbxw_zerobus_credentials ios_spn_application_id \
  #     --string-value "<spn-application-id-uuid>"

  jwt_signing_secret_key:
    description: >
      The key name for the JWT signing secret in the secret scope.
      Used by the auth service to sign app-issued JWTs (HS256).
    default: jwt_signing_secret
  apple_bundle_id_key:
    description: >
      The key name for the Apple bundle ID in the secret scope.
      Used to validate the `aud` claim in Apple identity tokens.
    default: apple_bundle_id
  ios_spn_application_id_key:
    description: >
      The key name for the iOS bootstrap SPN application_id in the secret scope.
      Used by the route guard (spn-route-guard.ts) to verify the SPN's identity
      and restrict it to auth routes only.
    default: ios_spn_application_id

  # ── iOS Bootstrap SPN — App Permissions ─────────────────────────────
  #
  # The application_id (client ID) of the iOS Bootstrap SPN, used in the
  # app resource's permissions block to grant CAN_USE. This value is
  # dynamically generated by the infra bundle's UC setup job and stored
  # in the secret scope under the ios_spn_application_id key.
  #
  # deploy.sh reads this value from the scope at deploy time and passes
  # it as --var ios_bootstrap_spn_id=<value> to `bundle deploy`. No
  # default is empty; deploy.sh overrides via --var at deploy time.
  ios_bootstrap_spn_id:
    description: >
      Application ID (client ID) of the iOS Bootstrap SPN. Passed by
      deploy.sh via --var override (read from the secret scope at deploy
      time). Used in the app permissions block to grant CAN_USE.
    default: ""

  # Tags — applied to all deployed resources via presets
  tags_project:
    default: dbxWearables ZeroBus
    description: Project tag for deployed resources.
  tags_businessUnit:
    default: Healthcare and Life Sciences
    description: Business unit tag for cost and ROI allocation.
  tags_developer:
    default: matthew.giglia@databricks.com
    description: Primary developer contact for Ops.
  tags_requestedBy:
    default: Healthcare Providers and Health Plans
    description: Primary business-unit stakeholder(s).
  tags_RemoveAfter:
    default: 2027-03-04
    description: >
      Required Databricks demo-environment tag for long-lived demos.
      Cannot exceed one year after the deployment date.

# ---------------------------------------------------------------------------
# Targets
# ---------------------------------------------------------------------------
targets:

  # ── dev ──────────────────────────────────────────────────────────────────
  dev:
    mode: development
    default: true
    presets:
      source_linked_deployment: false
      tags:
        project: ${var.tags_project}
        businessUnit: ${var.tags_businessUnit}
        requestedBy: ${var.tags_requestedBy}
        developer: ${var.tags_developer}
        RemoveAfter: ${var.tags_RemoveAfter}
        env: ${bundle.target}
    workspace:
      host: https://fevm-hls-fde.cloud.databricks.com
      root_path: /Workspace/Users/${var.run_as_user}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: hls_fde_dev
      schema: dev_matthew_giglia_wearables
      run_as_user: matthew.giglia@databricks.com
      client_id_dbs_key: client_id_${var.schema}
      client_secret_dbs_key: client_secret_${var.schema}
      postgres_branch: projects/dbxw-zerobus-wearables/branches/production
      postgres_database: projects/dbxw-zerobus-wearables/branches/production/databases/db-0k31-aj7nvq8pgr
      zerobus_stream_pool_size: "1"


  # ── hls_fde (production — same workspace as dev) ────────────────────────
  hls_fde:
    mode: production
    presets:
      source_linked_deployment: false
      tags:
        project: ${var.tags_project}
        businessUnit: ${var.tags_businessUnit}
        requestedBy: ${var.tags_requestedBy}
        developer: ${var.tags_developer}
        RemoveAfter: ${var.tags_RemoveAfter}
        env: ${bundle.target}
    workspace:
      host: https://fevm-hls-fde.cloud.databricks.com
      root_path: /Workspace/.bundle/${bundle.name}/${bundle.target}
    # run_as:
    #   user_name: ${var.run_as_user}
    variables:
      catalog: hls_fde
      schema: wearables
      higher_level_service_principal: acf021b4-87c6-44ff-b3d7-45c59d63fe4d
      run_as_user: ${var.higher_level_service_principal}
      serverless_environment_version: "5"
      client_id_dbs_key: client_id_${var.schema}
      client_secret_dbs_key: client_secret_${var.schema}
      postgres_branch: projects/dbxw-zerobus-wearables/branches/production
      postgres_database: projects/dbxw-zerobus-wearables/branches/production/databases/db-0k31-aj7nvq8pgr
    permissions:
      - user_name: matthew.giglia@databricks.com
        level: CAN_MANAGE
      - group_name: users
        level: CAN_RUN
      - service_principal_name: ${var.run_as_user}
        level: CAN_MANAGE

  # ── prod (placeholder — separate workspace TBD) ─────────────────────────
  prod:
    mode: production
    workspace:
      host: https://fevm-hls-fde.cloud.databricks.com
      # We always use /Users/matthew.giglia@databricks.com for all resources to make sure we only have a single copy.
      root_path: /Users/matthew.giglia@databricks.com/.bundle/${bundle.name}/${bundle.target}
    run_as:
      # This runs as matthew.giglia@databricks.com in production. We could also use a service principal here,
      # see https://docs.databricks.com/dev-tools/bundles/permissions.html.
      user_name: matthew.giglia@databricks.com
