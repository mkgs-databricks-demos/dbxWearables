# Databricks App — ZeroBus Ingest (AppKit)
#
# TypeScript/Node.js application built with @databricks/appkit (Express +
# React + Vite). Receives HealthKit JSON POSTs from the iOS app and
# streams them to the Unity Catalog bronze table via the ZeroBus
# TypeScript SDK (@databricks/zerobus-ingest-sdk).
#
# Architecture:
#   iOS App (HealthKit) → POST → this App (AppKit / Express)
#     → ZeroBus TypeScript SDK → wearables_zerobus bronze table
#     → Lakebase (Postgres) → app state, sessions, sync metadata
#
# Stack:
#   Backend:  @databricks/appkit (Express server, plugin architecture)
#   Frontend: React + Vite (via appkit-ui, optional admin dashboard)
#   Ingest:   @databricks/zerobus-ingest-sdk (TypeScript, Rust-backed)
#   Database: Lakebase Autoscaling (Postgres 17 via AppKit lakebase plugin)
#   Runtime:  command: ['npm', 'run', 'start'] (node dist/server.js)
#
# Authentication:
#   Two-layer model:
#     Layer 1 (User → App): Sign in with Apple → app-issued JWT (auth-service.ts)
#     Layer 2 (App → Workspace): M2M OAuth SPN (platform-managed)
#
#   The app's auto-provisioned service principal reads ZeroBus SPN
#   credentials (client_id, client_secret) from the infra bundle's
#   secret scope. These are injected as environment variables via the
#   app.yaml valueFrom directive. The app's own identity
#   (DATABRICKS_CLIENT_ID, DATABRICKS_CLIENT_SECRET) is injected by the
#   platform — the secret scope credentials are for ZeroBus specifically.
#
#   Mobile users authenticate via Sign in with Apple. The server validates
#   the Apple identity token, registers the user in Lakebase, and issues
#   a short-lived app JWT (HS256, 15 min) + refresh token (30 days).
#   The JWT's `sub` claim (Lakebase user_id UUID) is written to the bronze
#   table's user_id column for per-user data attribution.
#
#   Auth hardening: a route guard (spn-route-guard.ts) restricts the iOS
#   bootstrap SPN to auth routes only. Rate limiters throttle auth endpoints.
#
# Secret scope keys (schema-qualified in dev/hls_fde):
#   {client_id_dbs_key}       — ZeroBus SPN application_id
#   {client_secret_dbs_key}   — ZeroBus SPN OAuth secret (admin-provisioned)
#   workspace_url             — Databricks workspace URL
#   zerobus_endpoint          — ZeroBus Ingest server endpoint
#   target_table_name         — Fully qualified bronze table name
#   zerobus_stream_pool_size  — SDK gRPC stream pool size (non-sensitive config)
#   jwt_signing_secret        — HS256 key for app-issued JWTs (Phase 1 auth)
#   apple_bundle_id           — iOS app bundle identifier for Apple token validation
#   ios_spn_application_id    — iOS bootstrap SPN application_id for route guard
#
# Observability (Beta):
#   App telemetry is enabled via telemetry_export_destinations. The
#   platform auto-configures an OTLP collector at localhost:4314 and
#   streams traces, logs, and metrics to Unity Catalog tables:
#     ${var.catalog}.${var.schema}.${var.telemetry_table_prefix}_otel_logs
#     ${var.catalog}.${var.schema}.${var.telemetry_table_prefix}_otel_traces
#     ${var.catalog}.${var.schema}.${var.telemetry_table_prefix}_otel_metrics
#   Custom instrumentation (server/otel.ts) adds Express/HTTP auto-tracing.
#   See https://docs.databricks.com/aws/en/dev-tools/databricks-apps/observability/
#
# NOTE: Do NOT add npm registry proxies to env vars — Databricks Apps
#       have their own package mirror. Proxies are for local dev only.

resources:
  apps:
    zerobus_ingest:
      name: dbxw-0bus-ingest-${bundle.target}

      description: >
        AppKit (Node.js + React) application for wearable health data
        ingestion via ZeroBus. Receives HealthKit JSON POSTs from the
        iOS app through a custom Express route and streams request
        payload + HTTP headers to the Unity Catalog bronze table
        (wearables_zerobus) via the @databricks/zerobus-ingest-sdk.
        Authenticates to ZeroBus using the dedicated SPN credentials
        stored in the infra bundle's secret scope. Mobile users
        authenticate via Sign in with Apple (app-issued JWT).

      source_code_path: ../src/app

      # -----------------------------------------------------------------------
      # App Telemetry (Beta) — OpenTelemetry export to Unity Catalog
      #
      # Persists traces, logs, and metrics to three Delta tables in the
      # wearables schema. The platform injects OTEL_EXPORTER_OTLP_ENDPOINT
      # and related env vars automatically when this is configured.
      #
      # The Terraform provider schema for telemetry_export_destinations uses:
      #   unity_catalog:
      #     logs_table:    fully qualified table name
      #     traces_table:  fully qualified table name
      #     metrics_table: fully qualified table name
      #
      # Requirements (satisfied by infra bundle grants):
      #   - Deploying user needs CAN MANAGE on catalog + schema
      #   - CREATE TABLE on the schema (for first deployment)
      #
      # Recommendation: enable predictive optimization on the OTel tables
      # after first deployment for better query performance.
      # -----------------------------------------------------------------------
      telemetry_export_destinations:
        - unity_catalog:
            logs_table: ${var.catalog}.${var.schema}.${var.telemetry_table_prefix}_otel_logs
            traces_table: ${var.catalog}.${var.schema}.${var.telemetry_table_prefix}_otel_traces
            metrics_table: ${var.catalog}.${var.schema}.${var.telemetry_table_prefix}_otel_metrics

      # -----------------------------------------------------------------------
      # App resources — grant the app's auto-provisioned SPN access to the
      # ZeroBus credentials stored in the secret scope by the infra bundle.
      #
      # Each secret resource is available in app.yaml via:
      #   env:
      #     - name: ENV_VAR_NAME
      #       valueFrom: <resource-name>
      #
      # The app.yaml maps these to environment variables that the AppKit
      # server reads at startup (e.g. ZEROBUS_CLIENT_ID, ZEROBUS_ENDPOINT).
      # -----------------------------------------------------------------------
      resources:
        # OAuth M2M client ID for ZeroBus authentication
        - name: zerobus-client-id
          description: ZeroBus SPN application_id (OAuth M2M client identifier)
          secret:
            scope: ${var.secret_scope_name}
            key: ${var.client_id_dbs_key}
            permission: READ

        # OAuth M2M client secret for ZeroBus authentication
        - name: zerobus-client-secret
          description: ZeroBus SPN OAuth M2M client secret (admin-provisioned)
          secret:
            scope: ${var.secret_scope_name}
            key: ${var.client_secret_dbs_key}
            permission: READ

        # Databricks workspace URL
        - name: zerobus-workspace-url
          description: Databricks workspace URL for SDK/API calls
          secret:
            scope: ${var.secret_scope_name}
            key: workspace_url
            permission: READ

        # ZeroBus Ingest server endpoint
        - name: zerobus-endpoint
          description: ZeroBus Ingest server endpoint (derived from workspace ID + region)
          secret:
            scope: ${var.secret_scope_name}
            key: zerobus_endpoint
            permission: READ

        # Fully qualified bronze table name
        - name: zerobus-target-table
          description: Fully qualified bronze table name (catalog.schema.wearables_zerobus)
          secret:
            scope: ${var.secret_scope_name}
            key: target_table_name
            permission: READ

        # SDK stream pool size — non-sensitive config stored in the secret
        # scope to enable per-target control via the bundle variable
        # ${var.zerobus_stream_pool_size}. The service falls back to a
        # default of 4 if the env var is unset or the key is missing.
        # Populate via: databricks secrets put-secret \
        #   dbxw_zerobus_credentials zerobus_stream_pool_size \
        #   --string-value "${var.zerobus_stream_pool_size}"
        - name: zerobus-stream-pool-size
          description: Number of concurrent gRPC streams in the ZeroBus SDK stream pool
          secret:
            scope: ${var.secret_scope_name}
            key: zerobus_stream_pool_size
            permission: READ

        # ── JWT Authentication (Phase 1) ─────────────────────────────
        #
        # App-managed JWT auth for mobile clients (Sign in with Apple).
        # See server/services/auth-service.ts for usage.
        #
        # Graceful degradation: if these keys are not provisioned in the
        # secret scope, the auth service stays uninitialized and auth
        # endpoints return 503. The rest of the app works normally.

        # HS256 signing key for app-issued JWTs (access tokens).
        # Generate: openssl rand -base64 32
        # Provision: databricks secrets put-secret \
        #   dbxw_zerobus_credentials jwt_signing_secret \
        #   --string-value "<key>"
        - name: jwt-signing-secret
          description: HS256 signing key for app-issued JWTs (auth service)
          secret:
            scope: ${var.secret_scope_name}
            key: ${var.jwt_signing_secret_key}
            permission: READ

        # iOS app bundle identifier for Apple identity token validation.
        # The `aud` claim in Apple's identity JWT must match this value.
        # Non-sensitive but stored in secret scope for per-target control.
        # Provision: databricks secrets put-secret \
        #   dbxw_zerobus_credentials apple_bundle_id \
        #   --string-value "com.dbxwearables.healthKit"
        - name: apple-bundle-id
          description: iOS app bundle identifier for Apple identity token audience validation
          secret:
            scope: ${var.secret_scope_name}
            key: ${var.apple_bundle_id_key}
            permission: READ

        # ── Auth Hardening — iOS Bootstrap SPN Route Guard ───────────
        #
        # The application_id of the dedicated iOS bootstrap SPN.
        # Used by spn-route-guard.ts to verify the SPN's identity and
        # restrict it to auth routes only (no ingest, Lakebase, or admin).
        #
        # Graceful degradation: if not provisioned, the route guard still
        # restricts non-user proxy callers to auth routes, but cannot
        # verify the specific SPN identity.
        #
        # Provision: databricks secrets put-secret \
        #   dbxw_zerobus_credentials ios_spn_application_id \
        #   --string-value "<spn-application-id-uuid>"
        - name: ios-spn-application-id
          description: iOS bootstrap SPN application_id for route guard identity verification
          secret:
            scope: ${var.secret_scope_name}
            key: ${var.ios_spn_application_id_key}
            permission: READ

        # Lakebase Postgres — direct wire protocol (port 5432) via AppKit
        # lakebase plugin. The platform auto-injects PGHOST, PGPORT,
        # PGDATABASE, PGUSER, PGSSLMODE. The app.yaml maps the endpoint
        # path to LAKEBASE_ENDPOINT via valueFrom: postgres.
        - name: postgres
          description: Lakebase Postgres database for app state and operational data
          postgres:
            branch: ${var.postgres_branch}
            database: ${var.postgres_database}
            permission: CAN_CONNECT_AND_CREATE

      # Base permissions — all workspace users can use the app
      permissions:
        - user_name: matthew.giglia@databricks.com
          level: CAN_MANAGE
        - group_name: users
          level: CAN_USE

# ---------------------------------------------------------------------------
# Target-specific overrides
# ---------------------------------------------------------------------------
targets:

  dev:
    resources:
      apps:
        zerobus_ingest:
          name: ${bundle.target}-dbxw-0bus-ingest
          permissions:
            - user_name: matthew.giglia@databricks.com
              level: CAN_MANAGE
            - group_name: users
              level: CAN_USE

  hls_fde:
    resources:
      apps:
        zerobus_ingest:
          name: ${bundle.target}-dbxw-0bus-ingest
          permissions:
            - user_name: matthew.giglia@databricks.com
              level: CAN_MANAGE
            - service_principal_name: ${var.higher_level_service_principal}
              level: CAN_MANAGE
            - group_name: users
              level: CAN_USE

  prod:
    resources:
      apps:
        zerobus_ingest:
          permissions:
            - user_name: matthew.giglia@databricks.com
              level: CAN_MANAGE
            - group_name: users
              level: CAN_USE
