# Runtime configuration for the AppKit application.
#
# Environment variables are injected from app resources defined in
# resources/zerobus_ingest.app.yml via the valueFrom directive.
#
# Platform-injected (no valueFrom needed):
#   PGHOST, PGPORT, PGDATABASE, PGUSER, PGSSLMODE — from postgres resource
#   DATABRICKS_CLIENT_ID, DATABRICKS_CLIENT_SECRET — app's own SPN identity
#
# Platform-injected (when telemetry_export_destinations is configured):
#   OTEL_EXPORTER_OTLP_ENDPOINT  — http://localhost:4314
#   OTEL_EXPORTER_OTLP_PROTOCOL  — grpc
#   OTEL_RESOURCE_ATTRIBUTES     — workspace.id, app.name
#   OTEL_SERVICE_NAME            — app name
#   OTEL_BSP_MAX_QUEUE_SIZE      — 10000 (span queue)
#   OTEL_BLRP_MAX_QUEUE_SIZE     — 10000 (log queue)
#   OTEL_BSP_MAX_EXPORT_BATCH_SIZE  — 512
#   OTEL_BLRP_MAX_EXPORT_BATCH_SIZE — 512
#   OTEL_BSP_SCHEDULE_DELAY      — 1000ms
#   OTEL_BLRP_SCHEDULE_DELAY     — 1000ms
#
# Custom env vars (from secret scope + postgres resource):
#   LAKEBASE_ENDPOINT            — Lakebase endpoint path (from postgres resource)
#   ZEROBUS_CLIENT_ID            — ZeroBus SPN application_id
#   ZEROBUS_CLIENT_SECRET        — ZeroBus SPN OAuth secret
#   ZEROBUS_WORKSPACE_URL        — Databricks workspace URL for SDK calls
#   ZEROBUS_ENDPOINT             — ZeroBus Ingest server endpoint
#   ZEROBUS_TARGET_TABLE         — Fully qualified bronze table name
#   ZEROBUS_STREAM_POOL_SIZE     — SDK gRPC stream pool size (per-target via bundle var)
#   JWT_SIGNING_SECRET           — HS256 signing key for app-issued JWTs
#   APPLE_BUNDLE_ID              — iOS app bundle identifier for Apple token validation
#   IOS_SPN_APPLICATION_ID       — iOS bootstrap SPN application_id for route guard

command: ['npm', 'run', 'start']
env:
  # OpenTelemetry — enable trace sampling for custom instrumentation.
  # The platform injects the OTLP endpoint and batch config automatically;
  # this variable controls whether the app's OTel SDK generates spans.
  - name: OTEL_TRACES_SAMPLER
    value: 'always_on'

  # Lakebase — endpoint path for AppKit lakebase plugin
  - name: LAKEBASE_ENDPOINT
    valueFrom: postgres

  # ZeroBus Ingest SDK — credentials and config from infra bundle's secret scope
  - name: ZEROBUS_CLIENT_ID
    valueFrom: zerobus-client-id
  - name: ZEROBUS_CLIENT_SECRET
    valueFrom: zerobus-client-secret
  - name: ZEROBUS_WORKSPACE_URL
    valueFrom: zerobus-workspace-url
  - name: ZEROBUS_ENDPOINT
    valueFrom: zerobus-endpoint
  - name: ZEROBUS_TARGET_TABLE
    valueFrom: zerobus-target-table

  # ZeroBus SDK stream pool — number of concurrent gRPC streams.
  # Controlled per-target via var.zerobus_stream_pool_size in databricks.yml.
  # The service defaults to 4 if this env var is unset or the scope key is missing.
  - name: ZEROBUS_STREAM_POOL_SIZE
    valueFrom: zerobus-stream-pool-size

  # JWT Authentication — Sign in with Apple (Phase 1)
  # See server/services/auth-service.ts for usage.
  # Graceful degradation: if not set, auth endpoints return 503 but the
  # rest of the app (ZeroBus ingest, Lakebase, admin UI) works normally.

  # HS256 signing key for app-issued JWTs (access tokens).
  # Generate with: openssl rand -base64 32
  # Provision with: databricks secrets put-secret dbxw_zerobus_credentials jwt_signing_secret --string-value "<key>"
  - name: JWT_SIGNING_SECRET
    valueFrom: jwt-signing-secret

  # iOS app bundle identifier — used as the `aud` claim when validating
  # Apple identity tokens. Must match the bundle ID in the Xcode project.
  # Provision with: databricks secrets put-secret dbxw_zerobus_credentials apple_bundle_id --string-value "<bundle-id>"
  - name: APPLE_BUNDLE_ID
    valueFrom: apple-bundle-id

  # Auth Hardening — iOS Bootstrap SPN Route Guard
  # See server/middleware/spn-route-guard.ts for usage.
  #
  # The application_id of the dedicated iOS bootstrap SPN. The route guard
  # uses this to verify the SPN's identity and restrict it to auth routes
  # only (no access to ingest, Lakebase, or admin routes).
  #
  # Graceful degradation: if not set, the route guard still restricts all
  # non-user proxy-authenticated callers to auth routes, but cannot verify
  # whether the caller is the intended iOS SPN vs. an unknown SPN.
  #
  # Provision with: databricks secrets put-secret dbxw_zerobus_credentials ios_spn_application_id --string-value "<app-id-uuid>"
  - name: IOS_SPN_APPLICATION_ID
    valueFrom: ios-spn-application-id
