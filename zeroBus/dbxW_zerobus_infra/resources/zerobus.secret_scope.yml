# Secret scope for storing ZeroBus and wearable ingestion credentials.
# This scope stores sensitive credentials like client IDs, secrets,
# and environment-specific configuration values.
#
# After deploying this scope, populate secrets with the Databricks CLI:
#   databricks secrets put-secret --scope dbxw_zerobus_credentials --key client_id --string-value "<value>"
#   databricks secrets put-secret --scope dbxw_zerobus_credentials --key client_secret --string-value "<value>"
#   databricks secrets put-secret --scope dbxw_zerobus_credentials --key zerobus_endpoint --string-value "<value>"
#   databricks secrets put-secret --scope dbxw_zerobus_credentials --key workspace_url --string-value "<value>"
#   databricks secrets put-secret --scope dbxw_zerobus_credentials --key target_table_name --string-value "<catalog.schema.table>"

resources:
  secret_scopes:
    zerobus_secret_scope:
      name: ${var.secret_scope_name}

      # Databricks-managed backend (not Azure Key Vault or AWS Secrets Manager backed)
      backend_type: DATABRICKS

      # Prevent accidental deletion of the secret scope
      lifecycle:
        prevent_destroy: true

# ---------------------------------------------------------------------------
# Target-specific permissions
# ---------------------------------------------------------------------------
targets:

  dev:
    resources:
      secret_scopes:
        zerobus_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            - service_principal_name: ${var.zerobus_service_principal}
              level: READ
            - user_name: ${var.run_as_user}
              level: MANAGE
            - user_name: matthew.giglia@databricks.com
              level: MANAGE

  hls_fde:
    resources:
      secret_scopes:
        zerobus_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            # Service principal for app authentication (reads secrets at runtime)
            - service_principal_name: ${var.zerobus_service_principal}
              level: READ
            # Admin access for managing secrets
            - user_name: matthew.giglia@databricks.com
              level: MANAGE
            # Higher-level service principal for automated deployments
            - service_principal_name: ${var.higher_level_service_principal}
              level: MANAGE

  prod:
    resources:
      secret_scopes:
        zerobus_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            # Service principal for app authentication
            - service_principal_name: ${var.zerobus_service_principal}
              level: READ
            # Admin access for managing secrets
            - user_name: matthew.giglia@databricks.com
              level: MANAGE
            # Higher-level service principal for automated deployments
            - service_principal_name: ${var.higher_level_service_principal}
              level: MANAGE
