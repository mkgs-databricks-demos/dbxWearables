# Job to create current-state views over Lakehouse Sync history tables.
#
# Single-task workflow:
#   1. create_sync_views — runs the lakehouse-sync-views notebook which:
#      a) Preflight: verifies lb_load_test_runs_history and
#         lb_load_test_type_results_history exist in the target schema
#      b) Creates v_load_test_runs and v_load_test_type_results views
#         (ROW_NUMBER deduplication of SCD Type 2 history)
#
# DEPENDENCY ORDER:
#   This job must run AFTER:
#     1. dbxW_zerobus_app has been deployed and run at least one load test
#        (creates Lakebase tables app.load_test_runs, app.load_test_type_results)
#     2. Lakehouse Sync has been enabled for the app schema (one-time UI step)
#     3. Lakehouse Sync has produced the lb_*_history Delta tables
#
#   deploy.sh checks for the history tables before triggering this job.
#
# NOTE: catalog and schema references use ${resources.schemas.wearables_schema.*}
#       per the bundle convention — never ${var.catalog} or ${var.schema} directly.

resources:
  jobs:
    lakehouse_sync_views:
      name: dbxW ZeroBus — Lakehouse Sync Views

      description: >
        Creates current-state views over Lakehouse Sync SCD Type 2 history
        tables. The views deduplicate the append-only change log to expose
        the latest state of each load test run and per-type result, excluding
        deleted rows. Requires Lakehouse Sync to be enabled and the
        lb_*_history tables to exist. Idempotent — safe to re-run.

      # Job-level parameters — same pattern as wearables_uc_setup
      parameters:
        - name: catalog_use
          default: ${resources.schemas.wearables_schema.catalog_name}
        - name: schema_use
          default: ${resources.schemas.wearables_schema.name}

      tasks:
        - task_key: create_sync_views
          notebook_task:
            notebook_path: ../src/uc_setup/lakehouse-sync-views.sql
            source: WORKSPACE
            warehouse_id: ${resources.sql_warehouses.infra_warehouse.id}

      # One run at a time — prevents concurrent CREATE VIEW conflicts
      max_concurrent_runs: 1

      # Timeout after 5 minutes (views are lightweight DDL)
      timeout_seconds: 300

      tags:
        component: lakehouse_sync
        resource_type: view
        table_name: lb_load_test_runs_history

      # No automatic schedule — triggered by deploy.sh or run manually
      # after confirming Lakehouse Sync has produced the history tables.
