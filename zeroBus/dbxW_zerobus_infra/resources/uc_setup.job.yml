# Job to bootstrap and maintain the ZeroBus ingestion infrastructure.
#
# Two-task workflow:
#   1. ensure_service_principal — creates (or finds) a least-privilege SPN
#      dedicated to this schema, populates the secret scope with client_id,
#      workspace_url, zerobus_endpoint, and target_table_name, grants scope
#      READ, and outputs the SPN's application_id as a task value.
#   2. create_wearables_table — DDL + GRANT statements using the SPN from task 1.
#
# The client_secret must be provisioned separately by an admin via the
# workspace UI, Databricks CLI, or external keystore.
#
# NOTE: catalog and schema references use ${resources.schemas.wearables_schema.*}
#       per the bundle convention — never ${var.catalog} or ${var.schema} directly.

resources:
  jobs:
    wearables_uc_setup:
      name: dbxW ZeroBus — UC Setup

      description: >
        Bootstraps the ZeroBus ingestion infrastructure. Task 1 ensures a
        least-privilege service principal (dbxw-zerobus-{schema}) exists,
        populates the secret scope with client_id, workspace_url,
        zerobus_endpoint, and target_table_name, and grants the SPN READ
        access to the scope. Task 2 creates the wearables_zerobus bronze
        table (liquid clustering via CLUSTER BY AUTO) and grants USE CATALOG
        / USE SCHEMA / MODIFY / SELECT to the SPN. The client_secret must
        be provisioned by an admin after the first run. Idempotent — safe
        to re-run.

      # Job-level parameters — available to all tasks via dbutils.widgets.get()
      parameters:
        - name: catalog_use
          default: ${resources.schemas.wearables_schema.catalog_name}
        - name: schema_use
          default: ${resources.schemas.wearables_schema.name}
        - name: secret_scope_name
          default: ${var.secret_scope_name}

      tasks:
        # Task 1: Find or create the ZeroBus service principal
        - task_key: ensure_service_principal
          notebook_task:
            notebook_path: ../src/uc_setup/ensure-service-principal.ipynb
            source: WORKSPACE

        # Task 2: DDL + grants — receives SPN application_id from task 1
        - task_key: create_wearables_table
          depends_on:
            - task_key: ensure_service_principal
          notebook_task:
            notebook_path: ../src/uc_setup/target-table-ddl.sql
            source: WORKSPACE
            warehouse_id: ${resources.sql_warehouses.infra_warehouse.id}
            base_parameters:
              spn_application_id: "{{tasks.ensure_service_principal.values.spn_application_id}}"

      # One run at a time — prevents concurrent DDL/GRANT conflicts
      max_concurrent_runs: 1

      # Timeout after 10 minutes
      timeout_seconds: 600

      tags:
        component: setup
        resource_type: table
        table_name: wearables_zerobus

      # No automatic schedule — run manually or via deploy.sh
      # Uncomment below to schedule daily maintenance:
      # schedule:
      #   quartz_cron_expression: "0 0 9 * * ?"
      #   timezone_id: "America/Los_Angeles"
      #   pause_status: "PAUSED"
