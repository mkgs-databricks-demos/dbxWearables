# Job to bootstrap and maintain the ZeroBus ingestion infrastructure.
#
# Two-task workflow:
#   1. ensure_service_principal — creates (or finds) a least-privilege SPN
#      dedicated to this schema, populates the secret scope with the SPN's
#      client_id (under the key named by client_id_dbs_key), workspace_url,
#      zerobus_endpoint, target_table_name, and zerobus_stream_pool_size,
#      grants scope READ, and outputs the SPN's application_id as a task value.
#      Also creates the iOS bootstrap SPN, generates the JWT signing secret,
#      and stores the Apple bundle ID and iOS SPN application_id.
#   2. create_wearables_table — DDL + GRANT statements using the SPN from task 1.
#
# The client_secret must be provisioned separately by an admin via the
# workspace UI, Databricks CLI, or external keystore, under the key named
# by client_secret_dbs_key (schema-qualified in dev/hls_fde targets).
#
# The iOS SPN's OAuth client_secret must also be admin-provisioned and
# embedded in the iOS app binary (not stored in the secret scope).
#
# NOTE: catalog and schema references use ${resources.schemas.wearables_schema.*}
#       per the bundle convention — never ${var.catalog} or ${var.schema} directly.

resources:
  jobs:
    wearables_uc_setup:
      name: dbxW ZeroBus — UC Setup

      description: >
        Bootstraps the ZeroBus ingestion infrastructure. Task 1 ensures
        two service principals exist: the ZeroBus SPN
        (dbxw-zerobus-{schema}) for data ingestion, and the iOS
        bootstrap SPN (dbxw-ios-bootstrap-{schema}) for mobile auth.
        Populates the secret scope with SPN client IDs, workspace URL,
        ZeroBus endpoint, target table name, stream pool size, JWT
        signing secret (auto-generated), Apple bundle ID, and iOS SPN
        application ID. Grants scope READ access.
        Task 2 creates the wearables_zerobus bronze table (liquid
        clustering via CLUSTER BY AUTO) and grants USE CATALOG / USE
        SCHEMA / MODIFY / SELECT to the ZeroBus SPN.
        Admin steps required after first run: provision client_secret
        for ZeroBus SPN (schema-qualified key) and generate OAuth
        credentials for iOS SPN (embed in iOS binary). Idempotent —
        safe to re-run.

      # Job-level parameters — available to all tasks via dbutils.widgets.get()
      parameters:
        - name: catalog_use
          default: ${resources.schemas.wearables_schema.catalog_name}
        - name: schema_use
          default: ${resources.schemas.wearables_schema.name}
        - name: secret_scope_name
          default: ${var.secret_scope_name}
        - name: client_id_dbs_key
          default: ${var.client_id_dbs_key}
        - name: client_secret_dbs_key
          default: ${var.client_secret_dbs_key}
        - name: zerobus_stream_pool_size
          default: ${var.zerobus_stream_pool_size}

        # ── JWT Authentication (Phase 1) ──────────────────────────────
        - name: jwt_signing_secret_key
          default: ${var.jwt_signing_secret_key}
        - name: apple_bundle_id
          default: ${var.apple_bundle_id}
        - name: apple_bundle_id_key
          default: ${var.apple_bundle_id_key}
        - name: ios_spn_application_id_key
          default: ${var.ios_spn_application_id_key}

      tasks:
        # Task 1: Find or create the ZeroBus + iOS bootstrap service principals
        - task_key: ensure_service_principal
          notebook_task:
            notebook_path: ../src/uc_setup/ensure-service-principal.ipynb
            source: WORKSPACE

        # Task 2: DDL + grants — receives SPN application_id from task 1
        - task_key: create_wearables_table
          depends_on:
            - task_key: ensure_service_principal
          notebook_task:
            notebook_path: ../src/uc_setup/target-table-ddl.sql
            source: WORKSPACE
            warehouse_id: ${resources.sql_warehouses.infra_warehouse.id}
            base_parameters:
              spn_application_id: "{{tasks.ensure_service_principal.values.spn_application_id}}"

      # One run at a time — prevents concurrent DDL/GRANT conflicts
      max_concurrent_runs: 1

      # Timeout after 10 minutes
      timeout_seconds: 600

      tags:
        component: setup
        resource_type: table
        table_name: wearables_zerobus

      # No automatic schedule — run manually or via deploy.sh
      # Uncomment below to schedule daily maintenance:
      # schedule:
      #   quartz_cron_expression: "0 0 9 * * ?"
      #   timezone_id: "America/Los_Angeles"
      #   pause_status: "PAUSED"
